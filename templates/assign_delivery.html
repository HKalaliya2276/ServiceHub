{% extends 'base.html' %}

{% block content %}
<h2>Assign Delivery Boy</h2>

<form method="POST">
    {% csrf_token %}

    <select name="delivery_id">
        {% for boy in delivery_boys %}
            <option value="{{ boy.id }}">{{ boy.username }}</option>
        {% endfor %}
    </select>

    <button type="submit">Assign</button>
</form>

{% endblock %}

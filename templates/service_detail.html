{% extends 'base.html' %}

{% block content %}

<h2>Service Detail</h2>

<div class="card p-4 shadow">

    <h4>{{ service.title }}</h4>

    <p><strong>Description:</strong> {{ service.description }}</p>

    <p><strong>Price:</strong> ₹{{ service.price }}</p>

    <p><strong>Vendor:</strong> {{ service.vendor.username }}</p>

</div>

{% endblock %}
